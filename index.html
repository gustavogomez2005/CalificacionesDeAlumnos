<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/estilo.css">
    <title>Calificaciones</title>
</head>
<body>
    <header>
        <h1>Proyecto Calificaciones de Alumnos</h1>
        <h1>practicando arrays de objetos</h1>
    </header>

    <section>
        <div>
            <input type="text" id="nom" placeholder="Ingrese el nombre" required><br><br>
            <label>Primera Nota: </label>
            <input type="number" id="primeraNota"  min="1" max="10" step="1"><br><br>
            <label>Segnda Nota: </label>
            <input type="number" id="segundaNota" min="1" max="10" step="1"><br><br>
            <label>Tercera Nota: </label>
            <input type="number" id="terceraNota"  min="1" max="10" step="1"><br><br>
            <button id="btnAgregar">Agregar</button>                
            <button id="btnMostrarTodo">Mostrar Todo</button>                
            <button id="btnMostrarPromedio">Mostrar Promedio por Alumno</button>                
            <button id="btnBuscarAlumno">Buscar un Alumno</button>                
            <button id="btnMostrarAprobado">Mostrar Alumnos Aprobados</button>                
            <button id="btnMostrarDesaprobado">Mostrar Alumnos Desaprobados</button>                
        </div>
    </section>

    <footer>
        <h4>Diseñado por Pepita la pistolera</h4>
    </footer>
    <script src="./js/archivo.js"></script>
</body>
</html>
